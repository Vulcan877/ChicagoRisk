  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

s to your interests.<\u002Fp>\n        <\u002Fdiv>\n        <div>\n          <div style=\"font-family:'Newsreader',serif;font-size:30px;color:#C9A23F;margin-bottom:18px\">02<\u002Fdiv>\n          <h3 style=\"font-family:'Newsreader',serif;font-weight:600;font-size:23px;color:#102A43;margin:0 0 12px\">Experienced<\u002Fh3>\n          <p style=\"font:400 16px/1.7 'Public Sans',sans-serif;color:#56636F;margin:0\">Decades of risk management and insurance leadership stand behind every recommendation we make.<\u002Fp>\n        <\u002Fdiv>\n        <div>\n          <div style=\"font-family:'Newsreader',serif;font-size:30px;color:#C9A23F;margin-bottom:18px\">03<\u002Fdiv>\n          <h3 style=\"font-family:'Newsreader',serif;font-weight:600;font-size:23px;color:#102A43;margin:0 0 12px\">Personal<\u002Fh3>\n          <p style=\"font:400 16px/1.7 'Public Sans',sans-serif;color:#56636F;margin:0\">Oversight built around your organization, your family, and the priorities that are unique to you.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- PRINCIPAL TEASER -->\n    <section style=\"padding:0 0 120px\">\n      <div style=\"max-width:1120px;margin:0 auto;padding:0 40px;display:grid;grid-template-columns:0.85fr 1fr;gap:72px;align-items:center\">\n        <div style=\"position:relative;aspect-ratio:4/5;border:1px solid #E4E8EC;border-radius:3px;background:repeating-linear-gradient(135deg,#e9edf1 0 12px,#e2e7ec 12px 24px);display:flex;align-items:center;justify-content:center\">\n          <span style=\"color:#9aa6b2;font:12px 'Public Sans',monospace\">[ principal photo ]<\u002Fspan>\n        <\u002Fdiv>\n        <div>\n          <div style=\"display:flex;align-items:center;gap:12px;margin-bottom:24px\"><div style=\"width:24px;height:1.5px;background:#C9A23F\"><\u002Fdiv><div style=\"font:600 12px 'Public Sans',sans-serif;letter-spacing:.18em;text-transform:uppercase;color:#A8842F\">The principal<\u002Fdiv><\u002Fdiv>\n          <h2 style=\"font-family:'Newsreader',serif;font-weight:500;font-size:40px;line-height:1.15;letter-spacing:-.01em;color:#102A43;margin:0 0 20px\">Guided by experience you can trust.<\u002Fh2>\n          <p style=\"font:400 17px/1.75 'Public Sans',sans-serif;color:#56636F;margin:0 0 28px\">A career spent inside risk management and insurance — now applied entirely on the client's side of the table. The result is counsel that is candid, conflict-free, and grounded in decades of real-world judgment.<\u002Fp>\n          <a onclick=\"{{ goExpertise }}\" style=\"display:inline-flex;align-items:center;gap:8px;color:#2C5F8A;font:600 15px 'Public Sans',sans-serif;text-decoration:none;cursor:pointer\" style-hover=\"gap:13px;color:#102A43\">Read the full background →<\u002Fa>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- HOME TESTIMONIAL -->\n    <section style=\"padding:104px 0;background:#FFFFFF;border-top:1px solid #EDF0F3;border-bottom:1px solid #EDF0F3\">\n      <div style=\"max-width:880px;margin:0 auto;padding:0 40px;text-align:center\">\n        <div style=\"font-family:'Newsreader',serif;font-size:64px;color:#E3D3A8;line-height:.4;margin-bottom:10px\">“<\u002Fdiv>\n        <p style=\"font-family:'Newsreader',serif;font-style:italic;font-weight:400;font-size:30px;line-height:1.5;color:#1B2733;margin:0 0 28px\">For the first time, someone is watching our blind spots. CarolinaRisk gave us the one thing insurance never did — peace of mind.<\u002Fp>\n        <div style=\"font:600 14px 'Public Sans',sans-serif;letter-spacing:.04em;color:#102A43\">[ Client name ]<\u002Fdiv>\n        <div style=\"font:400 13px 'Public Sans',sans-serif;color:#8a96a2;margin-top:4px\">[ Title, Organization ]<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- CONTACT BAND -->\n    <section style=\"background:#102A43;padding:96px 0\">\n      <div style=\"max-width:1120px;margin:0 auto;padding:0 40px;display:flex;align-items:center;justify-content:space-between;gap:40px;flex-wrap:wrap\">\n        <div>\n          <h2 style=\"font-family:'Newsreader',serif;font-weight:500;font-size:38px;line-height:1.15;color:#fff;margin:0 0 10px\">Let's talk about what keeps you up at night.<\u002Fh2>\n          <p style=\"font:400 17px/1.6 'Public Sans',sans-serif;color:rgba(255,255,255,.7);margin:0\">A conversation is the first step toward clarity. No obligation.<\u002Fp>\n        <\u002Fdiv>\n        <a onclick=\"{{ goContact }}\" style=\"display:inline-flex;align-items:center;gap:10px;background:#C9A23F;color:#102A43;font:600 14px 'Public Sans',sans-serif;padding:16px 30px;border-radius:2px;text-decoration:none;cursor:pointer;white-space:nowrap\" style-hover=\"background:#b88f33\">Get in touch →<\u002Fa>\n      <\u002Fdiv>\n    <\u002Fsection>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ============ WHO WE ARE ============ -->\n  <sc-if value=\"{{ isWho }}\" hint-placeholder-val=\"{{ false }}\">\n  <div data-screen-label=\"Who We Are\">\n    <section style=\"padding:96px 0 40px\">\n      <div style=\"max-width:1120px;margin:0 auto;padding:0 40px\">\n        <div style=\"display:flex;align-items:center;gap:12px;margin-bottom:24px\"><div style=\"width:34px;height:1.5px;background:#C9A23F\"><\u002Fdiv><div style=\"font:600 12px 'Public Sans',sans-serif;letter-spacing:.18em;text-transform:uppercase;color:#A8842F\">Who we are<\u002Fdiv><\u002Fdiv>\n        <h1 style=\"font-family:'Newsreader',serif;font-weight:500;font-size:54px;line-height:1.08;letter-spacing:-.015em;color:#102A43;margin:0;max-width:780px\">A different kind of risk partner.<\u002Fh1>\n      <\u002Fdiv>\n    <\u002Fsection>\n    <section style=\"padding:30px 0 90px\">\n      <div style=\"max-width:760px;margin:0 auto;padding:0 40px\">\n        <p style=\"font:400 19px/1.85 'Public Sans',sans-serif;color:#3a4651;margin:0 0 26px\">CarolinaRisk is an independent risk management advisory built on a simple conviction: every organization and family deserves an expert whose only loyalty is to them. We are not a broker and not an agency. We sit on your side of the table — translating a fragmented world of policies, exposures, and fine print into a clear, coordinated plan.<\u002Fp>\n        <p style=\"font:400 19px/1.85 'Public Sans',sans-serif;color:#3a4651;margin:0\">That independence changes everything. Free of commissions and carrier quotas, our advice is shaped by one question alone: what is genuinely best for the people who trust us? It is a quieter, more deliberate way of working — and it is the reason our clients stay for decades.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fsection>\n    <section style=\"padding:0 0 110px\">\n      <div style=\"max-width:1120px;margin:0 auto;padding:0 40px\">\n        <div style=\"font:600 12px 'Public Sans',sans-serif;letter-spacing:.16em;text-transform:uppercase;color:#A8842F;margin-bottom:34px\">How we work<\u002Fdiv>\n        <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:32px\">\n          <div style=\"background:#fff;border:1px solid #E9ECEF;border-radius:3px;padding:34px 30px\">\n            <h3 style=\"font-family:'Newsreader',serif;font-weight:600;font-size:21px;color:#102A43;margin:0 0 12px\">We see the whole picture<\u002Fh3>\n            <p style=\"font:400 15px/1.7 'Public Sans',sans-serif;color:#56636F;margin:0\">Exposures rarely live in one policy. We map risk across your entire organization or household before anyone talks about coverage.<\u002Fp>\n          <\u002Fdiv>\n          <div style=\"background:#fff;border:1px solid #E9ECEF;border-radius:3px;padding:34px 30px\">\n            <h3 style=\"font-family:'Newsreader',serif;font-weight:600;font-size:21px;color:#102A43;margin:0 0 12px\">We coordinate, you decide<\u002Fh3>\n            <p style=\"font:400 15px/1.7 'Public Sans',sans-serif;color:#56636F;margin:0\">We manage carriers, brokers, and renewals on your behalf — and bring you clear options, never pressure.<\u002Fp>\n          <\u002Fdiv>\n          <div style=\"background:#fff;border:1px solid #E9ECEF;border-radius:3px;padding:34px 30px\">\n            <h3 style=\"font-family:'Newsreader',serif;font-weight:600;font-size:21px;color:#102A43;margin:0 0 12px\">We stay for the long term<\u002Fh3>\n            <p style=\"font:400 15px/1.7 'Public Sans',sans-serif;color:#56636F;margin:0\">Risk is never static. We review, adjust, and advocate year after year, so your protection keeps pace with your life.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ============ EXPERIENCED EXPERTISE ============ -->\n  <sc-if value=\"{{ isExpertise }}\" hint-placeholder-val=\"{{ false }}\">\n  <div data-screen-label=\"Experienced Expertise\">\n    <section style=\"padding:96px 0 40px\">\n      <div style=\"max-width:1120px;margin:0 auto;padding:0 40px\">\n        <div style=\"display:flex;align-items:center;gap:12px;margin-bottom:24px\"><div style=\"width:34px;height:1.5px;background:#C9A23F\"><\u002Fdiv><div style=\"font:600 12px 'Public Sans',sans-serif;letter-spacing:.18em;text-transform:uppercase;color:#A8842F\">Experienced expertise<\u002Fdiv><\u002Fdiv>\n        <h1 style=\"font-family:'Newsreader',serif;font-weight:500;font-size:54px;line-height:1.08;letter-spacing:-.015em;color:#102A43;margin:0;max-width:820px\">A lifetime of risk, on your side.<\u002Fh1>\n      <\u002Fdiv>\n    <\u002Fsection>\n    <!-- principal -->\n    <section style=\"padding:30px 0 80px\">\n      <div style=\"max-width:1120px;margin:0 auto;padding:0 40px;display:grid;grid-template-columns:0.8fr 1fr;gap:64px;align-items:start\">\n        <div style=\"position:relative;aspect-ratio:4/5;border:1px solid #E4E8EC;border-radius:3px;background:repeating-linear-gradient(135deg,#e9edf1 0 12px,#e2e7ec 12px 24px);display:flex;align-items:center;justify-content:center\">\n          <span style=\"color:#9aa6b2;font:12px 'Public Sans',monospace\">[ principal photo ]<\u002Fspan>\n        <\u002Fdiv>\n        <div> \"max-width:760px;margin:0 auto;padding:0 40px\">\n        <div style=\"font:600 12px 'Public Sans',sans-serif;letter-spacing:.16em;text-transform:uppercase;color:#A8842F;margin-bottom:18px\">Risk management &amp; insurance background<\u002Fdiv>\n        <p style=\"font:400 18px/1.8 'Public Sans',sans-serif;color:#3a4651;margin:0 0 20px\">From the carrier side to the corporate risk desk, the principal has spent a career learning exactly how risk is priced, transferred, and — too often — overlooked. That insider's view is now turned entirely toward the client: spotting the gaps brokers miss and the exposures policies quietly exclude.<\u002Fp>\n        <p style=\"font:400 18px/1.8 'Public Sans',sans-serif;color:#3a4651;margin:0\">It is expertise earned across industries and decades, distilled into plain-spoken counsel you can act on with confidence.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fsection>\n    <!-- awards -->\n    <section style=\"padding:60px 0\">\n      <div style=\"max-width:1120px;margin:0 auto;padding:0 40px\">\n        <div style=\"font:600 12px 'Public Sans',sans-serif;letter-spacing:.16em;text-transform:uppercase;color:#A8842F;margin-bottom:30px\">Awards &amp; distinctions<\u002Fdiv>\n        <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:28px\">\n          <div style=\"background:#fff;border:1px solid #E9ECEF;border-radius:3px;padding:30px;border-top:3px solid #C9A23F\"><div style=\"font-family:'Newsreader',serif;font-size:22px;color:#102A43;margin-bottom:8px\">[ Award ]<\u002Fdiv><div style=\"font:400 14px/1.6 'Public Sans',sans-serif;color:#56636F\">[ Awarding body · year ]<\u002Fdiv><\u002Fdiv>\n          <div style=\"background:#fff;border:1px solid #E9ECEF;border-radius:3px;padding:30px;border-top:3px solid #C9A23F\"><div style=\"font-family:'Newsreader',serif;font-size:22px;color:#102A43;margin-bottom:8px\">[ Distinction ]<\u002Fdiv><div style=\"font:400 14px/1.6 'Public Sans',sans-serif;color:#56636F\">[ Awarding body · year e.<\u002Fh1>\n        <p style=\"font:400 19px/1.7 'Public Sans',sans-serif;color:#56636F;margin:0;max-width:680px\">Whether you run an organization or a household, you get the same thing: an independent advisor who manages risk so you don't have to.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fsection>\n    <section style=\"padding:36px 0 110px\">\n      <div style=\"max-width:1120px;margin:0 auto;padding:0 40px;display:grid;grid-template-columns:1fr 1fr;gap:32px\">\n        <div style=\"background:#fff;border:1px solid #E9ECEF;border-radius:3px;padding:44px 40px\">\n          <div style=\"width:46px;height:46px;border-radius:8px;background:#102A43;display:flex;align-items:center;justify-content:center;color:#C9A23F;font-family:'Newsreader',serif;font-size:22px;margin-bottom:24px\">B<\u002Fdiv>\n          <h2 style=\"font-family:'Newsreader',serif;font-weight:600;font-size:26px;line-height:1.2;color:#102A43;margin:0 0 8px\">Businesses &amp; Non-Profits<\u002Fh2>\n          <div style=\"font:600 14px 'Public Sans',sans-serif;letter-spacing:.03em;color:#A8842F;margin-bottom:20px\">Outsourced risk management oversight<\u002Fdiv>\n          <p style=\"font:400 16px/1.7 'Public Sans',sans-serif;color:#56636F;margin:0 0 24px\">Your own risk department, without the overhead. We oversee exposures, coverage, and renewals so leadership can focus on the mission.<\u002Fp>\n          <div style=\"display:flex;flex-direction:column;gap:13px\">\n            <div style=\"display:flex;align-items:flex-start;gap:12px\"><div style=\"width:7px;height:7px;border-radius:50%;background:#C9A23F;margin-top:7px;flex:none\"><\u002Fdiv><span style=\"font:400 15px/1.55 'Public Sans',sans-serif;color:#3a4651\">Enterprise-wide risk assessment &amp; gap analysis<\u002Fspan><\u002Fdiv>\n            <div style=\"display:flex;align-items:flex-start;gap:12px\"><div style=\"width:7px;height:7px;border-radius:50%;background:#C9A23F;margin-top:7px;flex:none\"><\u002Fdiv><span style=\"font:400 15px/1.55 'Public Sans',sans-serif;color:#3a4651\">Broker &amp; carrier oversight and renewal management<\u002Fspan><\u002Fdiv>\n            <div style=\"display:flex;align-items:flex-start;gap:12px\"><div style=\"width:7px;height:7px;border-radius:50%;background:#C9A23F;margin-top:7px;flex:none\"><\u002Fdiv><span style=\"font:400 15px/1.55 'Public Sans',sans-serif;color:#3a4651\">Board-ready reporting &amp; claims advocacy<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background:#fff;border:1px solid #E9ECEF;border-radius:3px;padding:44px 40px\">\n          <div style=\"width:46px;height:46px;border-radius:8px;background:#2C5F8A;display:flex;align-items:center;justify-content:center;color:#fff;font-family:'Newsreader',serif;font-size:22px;margin-bottom:24px\">F<\u002Fdiv>\n          <h2 style=\"font-family:'Newsreader',serif;font-weight:600;font-size:26px;line-height:1.2;color:#102A43;margin:0 0 8px\">Families &amp; Individuals<\u002Fh2>\n          <div style=\"font:600 14px 'Public Sans',sans-serif;letter-spacing:.03em;color:#A8842F;margin-bottom:20px\">Personalized risk management oversight<\u002Fdiv>\n          <p style=\"font:400 16px/1.7 'Public Sans',sans-serif;color:#56636F;margin:0 0 24px\">A private advisor for everything you've built. We coordinate the policies and exposures that protect your family's wealth, home, and legacy.<\u002Fp>\n          <div style=\"display:flex;flex-direction:column;gap:13px\">\n            <div style=\"display:flex;align-items:flex-start;gap:12px\"><div style=\"width:7px;height:7px;border-radius:50%;background:#C9A23F;margin-top:7px;flex:none\"><\u002Fdiv><span style=\"font:400 15px/1.55 'Public Sans',sans-serif;color:#3a4651\">Personal risk review across property, liability &amp; life<\u002Fspan><\u002Fdiv>\n            <div style=\"display:flex;align-items:flex-start;gap:12px\"><div style=\"width:7px;height:7px;border-radius:50%;background:#C9A23F;margin-top:7px;flex:none\"><\u002Fdiv><span style=  Details are anonymized to protect client confidentiality.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fsection>\n    <section style=\"padding:40px 0 110px\">\n      <div style=\"max-width:1000px;margin:0 auto;padding:0 40px;display:flex;flex-direction:column;gap:28px\">\n\n        <!-- Case 01 -->\n        <div style=\"background:#fff;border:1px solid #E9ECEF;border-radius:3px;overflow:hidden;display:grid;grid-template-columns:1.55fr 1fr\">\n          <div style=\"padding:38px 40px\">\n            <div style=\"font:600 12px 'Public Sans',sans-serif;letter-spacing:.14em;text-transform:uppercase;color:#A8842F;margin-bottom:12px\">Case 01 · Non-profit<\u002Fdiv>\n            <h3 style=\"font-family:'Newsreader',serif;font-weight:600;font-size:25px;line-height:1.2;color:#102A43;margin:0 0 24px\">A growing nonprofit, dangerously underinsured<\u002Fh3>\n            <div style=\"display:flex;flex-direction:column;gap:16px\">\n              <div><div style=\"font:600 11px 'Public Sans',sans-serif;letter-spacing:.12em;text-transform:uppercase;color:#9aa6b2;margin-bottom:5px\">Issue<\u002Fdiv><p style=\"font:400 15px/1.65 'Public Sans',sans-serif;color:#3a4651;margin:0\">Rapid program expansion had outpaced coverage, leaving major liability and property gaps no one had flagged.<\u002Fp><\u002Fdiv>\n              <div><div style=\"font:600 11px 'Public Sans',sans-serif;letter-spacing:.12em;text-transform:uppercase;color:#9aa6b2;margin-bottom:5px\">Action<\u002Fdiv><p style=\"font:400 15px/1.65 'Public Sans',sans-serif;color:#3a4651;margin:0\">We ran a full exposure review, restructured the program, and renegotiated terms across three carriers.<\u002Fp><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"background:#102A43;padding:38px 34px;display:flex;flex-direction:column;justify-content:center\">\n            <div style=\"font:600 11px 'Public Sans',sans-serif;letter-spacing:.12em;text-transform:uppercase;color:#E6CB82;margin-bottom:14px\">Outcome<\u002Fdiv>\n            <div style=\"font-family:'Newsreader',serif;font-weight:500;font-size:46px;line-height:1;color:#C9A23F;margin-bottom:12px\">−31%<\u002Fdiv>\n            <p style=\"font:400 14px/1.6 'Public Sans',sans-serif;color:rgba(255,255,255,.78);margin:0\">premium cost, with materially broader protection and the gaps fully closed.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- Case 02 -->\n        <div style=\"background:#fff;border:1px solid #E9ECEF;border-radius:3px;overflow:hidden;display:grid;grid-template-columns:1.55fr 1fr\">\n          <div style=\"padding:38px 40px\">\n            <div style=\"font:600 12px 'Public Sans',sans-serif;letter-spacing:.14em;text-transform:uppercase;color:#A8842F;margin-bottom:12px\">Case 02 · Family<\u002Fdiv>\n            <h3 style=\"font-family:'Newsreader',serif;font-weight:600;font-size:25px;line-height:1.2;color:#102A43;margin:0 0 24px\">A family's wealth, exposed by a single gap<\u002Fh3>\n            <div style=\"display:flex;flex-direction:column;gap:16px\">\n              <div><div style=\"font:600 11px 'Public Sans',sans-serif;letter-spacing:.12em;text-transform:uppercase;color:#9aa6b2;margin-bottom:5px\">Issue<\u002Fdiv><p style=\"font:400 15px/1.65 'Public Sans',sans-serif;color:#3a4651;margin:0\">A high-net-worth household carried multiple policies from different agents, with overlaps in some areas and a serious liability shortfall in others.<\u002Fp><\u002Fdiv>\n              <div><div style=\"font:600 11px 'Public Sans',sans-serif;letter-spacing:.12em;text-transform:uppercase;color:#9aa6b2;margin-bottom:5px\">Action<\u002Fdiv><p style=\"font:400 15px/1.65 'Public Sans',sans-serif;color:#3a4651;margin:0\">We consolidated oversight, eliminated redundancy, and layered in an umbrella structure matched to their true exposure.<\u002Fp><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"background:#102A43;padding:38px 34px;display:flex;flex-direction:column;justify-content:center\">\n            <div style=\"font:600 11px 'Public Sans',sans-serif;letter-spacing:.12em;text-transform:uppercase;color:#E6CB82;margin-bottom:14px\">Outcome<\u002Fdiv>\n            <div style=\"font-family:'Newsreader',serif;font-weight:500;font-size:46px;line-height:1;color:#C9A23F;margin-bottom:12px\">$5M<\u002Fdiv>\n            <p style=\"font:400 14px/1.6 'Public Sans',sans-serif;color:rgba(255,255,255,.78);margin:0\">in newly secured liability protection — at lower total annual cost.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- Case 03 -->\n        <div style=\"background:#fff;border:1px solid #E9ECEF;border-radius:3px;overflow:hidden;display:grid;grid-template-columns:1.55fr 1fr\">\n          <div style=\"padding:38px 40px\">\n            <div style=\"font:600 12px 'Public Sans',sans-serif;letter-spacing:.14em;text-transform:uppercase;color:#A8842F;margin-bottom:12px\">Case 03 · Business<\u002Fdiv>\n            <h3 style=\"font-family:'Newsreader',serif;font-weight:600;font-size:25px;line-height:1.2;color:#102A43;margin:0 0 24px\">A denied claim, reversed<\u002Fh3>\n            <div style=\"display:flex;flex-direction:column;gap:16px\">\n              <div><div style=\"font:600 11px 'Public Sans',sans-serif;letter-spacing:.12em;text-transform:uppercase;color:#9aa6b2;margin-bottom:5px\">Issue<\u002Fdiv><p style=\"font:400 15px/1.65 'Public Sans',sans-serif;color:#3a4651;margin:0\">A mid-sized business faced a six-figure loss after a carrier denied a complex business-interruption claim.<\u002Fp><\u002Fdiv>\n              <div><div style=\"font:600 11px 'Public Sans',sans-serif;letter-spacing:.12em;text-transform:uppercase;color:#9aa6b2;margin-bottom:5px\">Action<\u002Fdiv><p style=\"font:400 15px/1.65 'Public Sans',sans-serif;color:#3a4651;margin:0\">We built the technical case, advocated through appeal, and held the carrier to the policy's true intent.<\u002Fp><\u002Fdiv>\n            <\u002Fdiv>\n          <\u0
